# APPENDIX: raw nginx reference config for Tier 2 / Tier 3
#
# This file is NOT deployed by the repo. It documents what a raw-nginx reverse
# proxy with the same threat model looks like, including interface pinning that
# managed reverse proxies (NPM, Caddy, Traefik) generally do not do.
#
# Most operators following docs/secure-access.md will use NPM/Caddy/Traefik
# instead, which achieve the equivalent L7 enforcement via UI-managed access
# lists. Their containers bind 0.0.0.0 by virtue of Docker port mapping
# (`ports: ["443:443"]`) — interface pinning is therefore not part of those
# paths.
#
# Use this file as a reference if you:
#   - run nginx directly on a Linux host (no container indirection);
#   - want to verify the generated config of a managed proxy
#     (NPM exposes its rendered config in /data/nginx/proxy_host/*.conf);
#   - ever migrate off the managed proxy.
#
# Substitutions for a Tier 2 / Tier 3 deployment:
#   <NGINX_LAN_IP>     proxy host's LAN IP                    e.g. 192.168.1.20
#   <NGINX_TS_IP>      proxy host's Tailscale IP              e.g. 100.64.10.5
#   <LAN_CIDR>         home LAN CIDR                          e.g. 192.168.1.0/24
#   <STREMIO_UPSTREAM> Stremio host LAN IP + port             e.g. 10.168.77.10:11470
#   <CERT_PATH>        fullchain.pem from a DNS-01 issuance
#   <KEY_PATH>         privkey.pem
#   <SERVER_NAME>      your domain                            e.g. stremio.example.com
#
# Tier 2 assumes the public DNS A record for <SERVER_NAME> points at the
# proxy host's Tailscale IP (100.x.y.z), so the open internet has no route to
# this host. Tier 3 points it at the real public IP and the L3 isolation is
# gone — keep the L7 allowlist either way, and add real auth on top for Tier 3.
#
# Cert renewal is wired through DNS-01 (Cloudflare API or equivalent), since
# HTTP-01 stops working once public port 80 is unreachable.
#
# This server block does NOT listen on the public-facing NIC. Adding a third
# `listen 0.0.0.0:443` would silently re-expose the service.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    # Pin to specific interfaces. The public NIC has no listener for this
    # hostname; the kernel rejects SYNs at L4.
    listen <NGINX_LAN_IP>:443 ssl http2;
    listen <NGINX_TS_IP>:443  ssl http2;
    server_name <SERVER_NAME>;

    ssl_certificate     <CERT_PATH>;
    ssl_certificate_key <KEY_PATH>;

    # L7 allowlist — defense in depth on top of the interface pinning above.
    # The Tailscale CGNAT range covers every tailnet peer.
    allow 100.64.0.0/10;
    allow <LAN_CIDR>;
    deny  all;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;

    # Stremio streaming uses Range and long-lived bodies; default buffering
    # would break HLS progress and stall large MP4 seeks.
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_read_timeout      1h;

    location / {
        proxy_pass http://<STREMIO_UPSTREAM>;
    }
}
