services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: .env
    environment:
      HTTP_CONTROL_SERVER_ADDRESS: 127.0.0.1:18080
    volumes:
      - ./gluetun-data:/gluetun

  stremio:
    build:
      context: .
      dockerfile: docker/stremio/Dockerfile
      args:
        STREMIO_APPLY_PATCHES: ${STREMIO_APPLY_PATCHES:-1}
    image: stremioguard-stremio:local
    container_name: stremio-server
    restart: "no"
    shm_size: "2gb"
    environment:
      - NO_CORS=1
      - AUTO_SERVER_URL=1
      - CASTING_DISABLED=${CASTING_DISABLED:-}
      - FFMPEG_BIN=/usr/bin/ffmpeg
      - FFPROBE_BIN=/usr/bin/ffprobe
      - STREMIO_SKIP_HW_PROBE=${STREMIO_SKIP_HW_PROBE:-1}
      - EXTERNAL_BASE_URL=${EXTERNAL_BASE_URL:-}
      - INTERNAL_MEDIA_BASE_URL=${INTERNAL_MEDIA_BASE_URL:-http://127.0.0.1:11470}
    volumes:
      - ./stremio-data:/root/.stremio-server
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  comet-postgres:
    image: postgres:18-alpine
    container_name: comet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: comet
      POSTGRES_PASSWORD: comet
      POSTGRES_DB: comet
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=8MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "max_connections=100"
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comet -d comet"]
      interval: 5s
      timeout: 5s
      retries: 5

  comet:
    image: g0ldyy/comet
    container_name: comet
    restart: unless-stopped
    environment:
      DATABASE_TYPE: postgresql
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
      comet-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
